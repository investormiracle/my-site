<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zukky Exchange</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #ffffff;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      padding: 40px 20px;
    }

    /* Animated & Clickable BTC Background */
    .btc-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .btc {
      position: absolute;
      font-size: 2.8rem;
      color: #F7931A;
      opacity: 0.09;
      animation: floatBTC 25s linear infinite;
      user-select: none;
      z-index: 1;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btc:hover {
      opacity: 0.35;
      transform: scale(1.25);
    }

    @keyframes floatBTC {
      0%   { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }

    .btc:nth-child(1)  { left: 8%; animation-duration: 28s; animation-delay: 0s; }
    .btc:nth-child(2)  { left: 18%; animation-duration: 35s; animation-delay: -8s; font-size: 2.2rem; }
    .btc:nth-child(3)  { left: 28%; animation-duration: 22s; animation-delay: -15s; }
    .btc:nth-child(4)  { left: 42%; animation-duration: 31s; animation-delay: -4s; font-size: 3.1rem; }
    .btc:nth-child(5)  { left: 55%; animation-duration: 26s; animation-delay: -18s; }
    .btc:nth-child(6)  { left: 65%; animation-duration: 33s; animation-delay: -11s; font-size: 2.5rem; }
    .btc:nth-child(7)  { left: 78%; animation-duration: 24s; animation-delay: -22s; }
    .btc:nth-child(8)  { left: 85%; animation-duration: 29s; animation-delay: -3s; font-size: 2.9rem; }
    .btc:nth-child(9)  { left: 12%; animation-duration: 27s; animation-delay: -14s; }
    .btc:nth-child(10) { left: 72%; animation-duration: 32s; animation-delay: -7s; font-size: 2.3rem; }

    .hero-content {
      max-width: 900px;
      z-index: 2;
      position: relative;
    }

    .logo {
      font-size: 5.8rem;
      font-weight: 800;
      color: #001F3F;
      margin-bottom: 8px;
      letter-spacing: -3px;
    }

    .logo span {
      color: #007A5E;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #001F3F;
      margin: 15px 0 25px 0;
    }

    .hero p {
      font-size: 1.9rem;
      color: #222222;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .cta-button {
      display: inline-block;
      background: #007A5E;
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 60px;
      transition: all 0.4s ease;
      box-shadow: 0 10px 25px rgba(0, 122, 94, 0.3);
      min-width: 280px; /* Better touch target */
    }

    .cta-button:hover {
      background: #001F3F;
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(0, 31, 63, 0.3);
    }

    /* SOCIAL ICONS */
    .social-float {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      z-index: 3;
    }

    .social-icon {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(0, 31, 63, 0.18);
    }

    .social-icon:hover {
      transform: translateY(-12px) scale(1.12);
      box-shadow: 0 18px 35px rgba(0, 122, 94, 0.3);
    }

    .social-icon svg {
      width: 34px;
      height: 34px;
      fill: white;
    }

    .x-icon       { background: #001F3F; }
    .whatsapp-icon { background: #25D366; }
    .telegram-icon { background: #229ED9; }

    .social-icon:focus {
      outline: 4px solid #007A5E;
      outline-offset: 4px;
    }

    /* ==================== MOBILE OPTIMIZATIONS ==================== */
    @media (max-width: 768px) {
      .hero {
        padding: 30px 15px;
        min-height: 100vh;
      }

      .logo {
        font-size: 4.2rem;
      }

      .hero h1 {
        font-size: 2.8rem;
      }

      .hero p {
        font-size: 1.5rem;
      }

      .cta-button {
        font-size: 1.35rem;
        padding: 16px 40px;
        min-width: 260px;
      }

      .social-float {
        bottom: 50px;
        gap: 20px;
      }

      .social-icon {
        width: 62px;
        height: 62px;
      }

      .social-icon svg {
        width: 30px;
        height: 30px;
      }

      .btc {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 3.8rem;
      }

      .hero h1 {
        font-size: 2.5rem;
      }

      .hero p {
        font-size: 1.35rem;
      }

      .social-float {
        bottom: 40px;
        gap: 18px;
      }

      .social-icon {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>
